<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Base64 Slicer & Rebuilder</title>

<style>
/* =========================
   Mini Bootstrap (offline)
   ========================= */

:root{
  --bg:#0f172a;
  --card:#111827;
  --border:#334155;
  --primary:#2563eb;
  --primary-hover:#1d4ed8;
  --success:#22c55e;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --danger:#ef4444;
}

*{box-sizing:border-box}

body{
  margin:0;
  padding:24px;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu;
  line-height:1.45;
}

/* Container */
.container{
  max-width:1100px;
  margin:auto;
}

/* Typography */
h1{
  margin-top:0;
  color:#38bdf8;
}

h2{
  color:#7dd3fc;
  margin-top:0;
}

/* Cards */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:18px;
  margin-bottom:20px;
  box-shadow:0 10px 25px rgba(0,0,0,.35);
}

/* Grid */
.row{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
}

.col{
  flex:1;
  min-width:0;
}

/* Inputs */
input[type="text"],
input[type="file"]{
  width:100%;
  padding:8px 10px;
  background:#020617;
  color:var(--text);
  border:1px solid var(--border);
  border-radius:8px;
  outline:none;
}

input[type="text"]:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 2px rgba(37,99,235,.25);
}

/* Buttons */
.btn{
  border:none;
  padding:7px 14px;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  transition:.15s ease;
  white-space:nowrap;
}

.btn-primary{
  background:var(--primary);
  color:white;
}
.btn-primary:hover{ background:var(--primary-hover); }

.btn-success{
  background:var(--success);
  color:white;
}

.btn-danger{
  background:var(--danger);
  color:white;
}

.btn:disabled{
  opacity:.5;
  cursor:not-allowed;
}

/* Rows */
.slice-row,
.paste-row{
  display:flex;
  align-items:center;
  gap:8px;
  margin:6px 0;
  font-size:13px;
}

/* Log */
#log{
  background:#020617;
  padding:12px;
  height:220px;
  overflow-y:auto;
  font-family:ui-monospace, monospace;
  font-size:12px;
  border-radius:10px;
  border:1px solid var(--border);
}

/* Download link */
.download-link{
  display:inline-block;
  margin-top:10px;
  color:#4ade80;
  font-weight:600;
  text-decoration:none;
}
.download-link:hover{ text-decoration:underline; }

/* Badge */
.badge{
  background:#1e293b;
  padding:2px 8px;
  border-radius:999px;
  font-size:11px;
  color:var(--muted);
}
</style>
</head>

<body>
<div class="container">

<h1>Base64 Slicer & Rebuilder</h1>

<div class="card">
  <h2>Step 1 — File → Base64 → Slices</h2>
  <input type="file" id="fileInput">
  <div id="sliceList"></div>
</div>

<div class="card">
  <h2>Step 2 — Paste & Rebuild</h2>
  <div id="pasteArea"></div>
  <a id="downloadLink" class="download-link" style="display:none;" download="reconstructed.bin">
    Download reconstructed file
  </a>
</div>

<div class="card">
  <h2>System Log</h2>
  <div id="log"></div>
</div>

</div>

<script>
const SLICE_SIZE = 500000;
let slices = [];
let pastedSlices = [];

function log(msg) {
  const logDiv = document.getElementById("log");
  const time = new Date().toLocaleTimeString();
  logDiv.innerHTML += `[${time}] ${msg}<br>`;
  logDiv.scrollTop = logDiv.scrollHeight;
}

/* ---------- FILE PROCESSING ---------- */
document.getElementById("fileInput").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;

  log("File selected: " + file.name);
  log("Reading file as Base64...");

  const reader = new FileReader();

  reader.onload = () => {
    const base64 = reader.result.split(",")[1];
    log("Base64 conversion complete.");
    createSlices(base64);
  };

  reader.readAsDataURL(file);
});

function createSlices(base64) {
  slices = [];
  document.getElementById("sliceList").innerHTML = "";

  log("Creating 500000-char slices...");

  for (let i = 0; i < base64.length; i += SLICE_SIZE) {
    slices.push(base64.slice(i, i + SLICE_SIZE));
  }

  log(`Total slices created: ${slices.length}`);
  renderSlices();
}

function renderSlices() {
  const container = document.getElementById("sliceList");
  container.innerHTML = "";

  slices.forEach((slice, index) => {
    const row = document.createElement("div");
    row.className = "slice-row";

    const badge = document.createElement("span");
    badge.className = "badge";
    badge.textContent = "#" + (index + 1);

    const preview = document.createElement("input");
    preview.type = "text";
    preview.value = slice.slice(0, 80) + " ...";
    preview.readOnly = true;

    const btn = document.createElement("button");
    btn.className = "btn btn-primary";
    btn.textContent = "Copy";

    btn.onclick = async () => {
      await navigator.clipboard.writeText(slice);
      log(`Slice ${index + 1} copied to clipboard.`);
    };

    row.appendChild(badge);
    row.appendChild(preview);
    row.appendChild(btn);
    container.appendChild(row);
  });

  log("Slice list rendered.");
}

/* ---------- PASTE FLOW ---------- */
function addPasteRow() {
  const area = document.getElementById("pasteArea");
  const index = pastedSlices.length;

  const row = document.createElement("div");
  row.className = "paste-row";

  const badge = document.createElement("span");
  badge.className = "badge";
  badge.textContent = "#" + (index + 1);

  const input = document.createElement("input");
  input.type = "text";
  input.placeholder = "Paste slice here...";

  const pasteBtn = document.createElement("button");
  pasteBtn.className = "btn btn-primary";
  pasteBtn.textContent = "Paste";

  const finishBtn = document.createElement("button");
  finishBtn.className = "btn btn-success";
  finishBtn.textContent = "Finish";
  finishBtn.style.display = "none";

  pasteBtn.onclick = async () => {
    try {
      const text = await navigator.clipboard.readText();
      input.value = text.slice(0, 80) + " ...";
      pastedSlices[index] = text;
      log(`Slice ${index + 1} pasted.`);

      pasteBtn.disabled = true;
      finishBtn.style.display = "inline-block";

      addPasteRow();
    } catch {
      log("Clipboard paste failed.");
    }
  };

  finishBtn.onclick = rebuildFile;

  row.appendChild(badge);
  row.appendChild(input);
  row.appendChild(pasteBtn);
  row.appendChild(finishBtn);
  area.appendChild(row);

  log("Waiting for next paste...");
}

/* ---------- REBUILD ---------- */
function rebuildFile() {
  log("Combining slices...");
  const combined = pastedSlices.join("");

  log("Decoding Base64 back to binary...");

  try {
    const byteChars = atob(combined);
    const byteNumbers = new Array(byteChars.length);

    for (let i = 0; i < byteChars.length; i++) {
      byteNumbers[i] = byteChars.charCodeAt(i);
    }

    const blob = new Blob([new Uint8Array(byteNumbers)]);
    const url = URL.createObjectURL(blob);

    const link = document.getElementById("downloadLink");
    link.href = url;
    link.style.display = "inline-block";

    log("Reconstruction complete. Download ready.");
  } catch (e) {
    log("ERROR: Base64 decode failed.");
    console.error(e);
  }
}

/* ---------- INIT ---------- */
addPasteRow();
log("System ready.");
</script>
</body>
</html>
